# Extra autostart processes
# exec-once = uwsm app -- my-service
# Laptop-only: auto-toggle the touchpad when an external mouse is connected.
# Installed by stow_all.sh on the laptop only, so the test no-ops on the desktop.
exec-once = uwsm app -- bash -c 'if [ -x "$HOME/bin/auto-touchpad-toggle" ]; then exec "$HOME/bin/auto-touchpad-toggle"; fi'
